<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatsFlow</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-wrap">
    <header class="options-header">
      <img src="icons/icon48.png" width="48" height="48" alt="" class="options-icon">
      <h1 id="options-title"></h1>
    </header>
    <p id="options-desc" class="options-desc"></p>
    <p class="options-meta"><span id="options-version-label"></span><strong id="options-version"></strong></p>
    <h2 id="options-features-heading" class="options-sub"></h2>
    <ul id="options-features-list" class="options-features-list"></ul>
    <h2 id="options-links-heading" class="options-sub options-sub-spaced"></h2>
    <ul class="options-link-list">
      <li><a id="link-github" href="https://github.com/Json-wu/statsflow" target="_blank" rel="noopener noreferrer">GitHub</a></li>
      <li><a id="link-privacy" href="https://json-wu.github.io/statsflow/privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a></li>
    </ul>
  </div>
  <script src="statsflow-i18n.js"></script>
  <script src="options.js"></script>
</body>
</html>
