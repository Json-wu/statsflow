<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Browser History & Analytics Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1><img src="icons/icon48.png" alt="" class="header-icon"><span data-i18n="extName"></span></h1>
        <button type="button" class="view-switch-btn" id="view-switch-btn" data-i18n-title="switchToStats">
          <svg class="icon-chart" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 20V10M12 20V4M6 20v-6"/>
          </svg>
          <svg class="icon-history hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 8v4l2 2"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </button>
      </div>
      <div class="stats-summary">
        <span id="total-sites">Sites: 0</span>
        <span id="total-visits">Visits: 0</span>
      </div>
    </header>
    
    <div id="history-view" class="view-content">
    <div class="search-box">
      <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder">
    </div>
    
    <div class="filter-box">
      <button class="filter-btn" data-filter="all" data-i18n="filterAll">All</button>
      <button class="filter-btn" data-filter="hour" data-i18n="filterHour">Hour</button>
      <button class="filter-btn active" data-filter="today" data-i18n="filterToday">Today</button>
      <button class="filter-btn" data-filter="week" data-i18n="filterWeek">Week</button>
      <button class="filter-btn" data-filter="month" data-i18n="filterMonth">Month</button>
    </div>
    
    <div class="toolbar">
      <div class="toolbar-left">
        <button type="button" class="toolbar-icon-btn export-btn" id="export-btn" data-i18n-title="exportCsv">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button type="button" class="toolbar-icon-btn calendar-btn" id="calendar-btn" data-i18n-title="selectDate">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>
        <span id="date-badge" class="date-badge hidden"></span>
      </div>
      <div class="toolbar-right">
        <div class="sort-tabs">
        <button type="button" class="sort-tab active" data-sort="time" data-i18n="sortByTime">Time</button>
        <button type="button" class="sort-tab" data-sort="visits" data-i18n="sortByVisits">Visits</button>
        </div>
      </div>
    </div>
    
    <div id="calendar-overlay" class="calendar-overlay hidden">
      <div class="calendar-popup">
        <div class="calendar-header">
          <button type="button" class="calendar-nav" id="calendar-prev">‹</button>
          <span id="calendar-month-title">2025年3月</span>
          <button type="button" class="calendar-nav" id="calendar-next">›</button>
        </div>
        <div class="calendar-weekdays">
          <span data-i18n="calendarSun"></span><span data-i18n="calendarMon"></span><span data-i18n="calendarTue"></span><span data-i18n="calendarWed"></span><span data-i18n="calendarThu"></span><span data-i18n="calendarFri"></span><span data-i18n="calendarSat"></span>
        </div>
        <div id="calendar-days" class="calendar-days"></div>
      </div>
    </div>
    
    <div id="history-list" class="history-list">
      <div class="loading" data-i18n="loading">Loading...</div>
    </div>
    </div>
    
    <div id="settings-overlay" class="settings-overlay hidden">
      <div class="settings-popup">
        <div class="settings-header">
          <h3 data-i18n="privacySettings">Privacy</h3>
          <button type="button" class="settings-close" id="settings-close">×</button>
        </div>
        <div class="settings-section">
          <label data-i18n="blacklistLabel">Blacklist</label>
          <div class="blacklist-input-wrap">
            <div class="blacklist-input-row">
              <input type="text" id="blacklist-input" data-i18n-placeholder="blacklistPlaceholder" autocomplete="off">
              <button type="button" id="blacklist-add" data-i18n="add">Add</button>
            </div>
            <div id="blacklist-suggestions" class="blacklist-suggestions hidden" role="listbox" aria-label="Domain suggestions"></div>
          </div>
          <ul id="blacklist-list" class="blacklist-list"></ul>
        </div>
      </div>
    </div>
    
    <div id="stats-view" class="view-content hidden">
    <div class="stats-filter-box">
      <button class="filter-btn" data-filter="all" data-i18n="filterAll">All</button>
      <button class="filter-btn" data-filter="hour" data-i18n="filterHour">Hour</button>
      <button class="filter-btn active" data-filter="today" data-i18n="filterToday">Today</button>
      <button class="filter-btn" data-filter="week" data-i18n="filterWeek">Week</button>
      <button class="filter-btn" data-filter="month" data-i18n="filterMonth">Month</button>
    </div>
    <div id="trend-chart" class="trend-chart">
      <div class="trend-chart-header">
        <span class="trend-chart-title" id="stats-trend-title"></span>
      </div>
      <div id="trend-chart-bars" class="trend-chart-bars"></div>
    </div>
    
    <div id="hour-chart" class="hour-chart">
      <div class="hour-chart-title" id="stats-hour-title"></div>
      <div id="hour-chart-bars" class="hour-chart-bars"></div>
    </div>
    
    <div id="category-chart" class="category-chart">
      <div class="category-chart-title" data-i18n="categoryChartTitle">By category</div>
      <div id="category-chart-bars" class="category-chart-bars"></div>
    </div>
    </div>
  </div>
  
    <footer class="bottom-bar">
      <div class="bottom-bar-left">
        <button type="button" class="icon-btn icon-only settings-btn" id="settings-btn" data-i18n-title="privacySettings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5z"/>
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.5 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.5 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/>
          </svg>
        </button>
        <button type="button" class="icon-btn icon-only theme-btn" id="theme-btn" aria-label="Theme">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div class="lang-menu-wrap">
          <button type="button" class="icon-btn icon-only lang-btn" id="lang-btn" data-i18n-title="switchLanguage" aria-expanded="false" aria-haspopup="true" aria-controls="lang-menu">
            <svg class="lang-icon-glyph" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <text class="lang-icon-letter-a" x="2" y="16.5" font-size="11.5" font-weight="700" fill="currentColor" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">A</text>
              <text class="lang-icon-letter-han" x="12.5" y="16.5" font-size="10.5" font-weight="600" fill="currentColor" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif">文</text>
            </svg>
          </button>
          <div id="lang-menu" class="lang-menu-dropdown hidden" role="menu" aria-labelledby="lang-btn">
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="en" data-i18n="langEnglish">English</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="zh_CN" data-i18n="langChinese">简体中文</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="ja" data-i18n="langJapanese">日本語</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="ru" data-i18n="langRussian">Русский</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="id" data-i18n="langIndonesian">Bahasa Indonesia</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="ar" data-i18n="langArabic">العربية</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="es" data-i18n="langSpanish">Español</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="pt_BR" data-i18n="langPortugueseBrazil">Português (Brasil)</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="de" data-i18n="langGerman">Deutsch</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="fr" data-i18n="langFrench">Français</button>
            <button type="button" class="lang-menu-item" role="menuitem" data-locale="ko" data-i18n="langKorean">한국어</button>
          </div>
        </div>
        <button type="button" class="icon-btn icon-only extension-page-btn" id="extension-page-btn" data-i18n-title="openExtensionPage" data-i18n-aria-label="openExtensionPage">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <button type="button" class="icon-btn icon-only github-btn" id="github-btn" data-i18n-title="openGitHub" data-i18n-aria-label="openGitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
        </button>
      </div>
      <div class="bottom-bar-right">
        <button type="button" class="icon-btn icon-only back-to-top-btn hidden" id="back-to-top-btn" data-i18n-title="backToTop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
        </button>
      </div>
  </footer>
  
  <script src="statsflow-i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
